version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: grymster-torrserver_app_1
      APP_PORT: 8090
      PROXY_AUTH_ADD: "false"
  app:
    image: ghcr.io/yourok/torrserver:MatriX.141.4@sha256:a06f7edeae97e4c84ee2c3a78c088ffccbb59ea1323ee02d4e158b047896fdbc
    user: "1000:1000"
    environment:
      TS_PORT: "8090"
      TS_DONTKILL: "1"
      TS_HTTPAUTH: "0"
      TS_CONF_PATH: /opt/torrserver/config
      TS_TORR_DIR: /opt/torrserver/torrents
    volumes:
      - ${APP_DATA_DIR}/data/config:/opt/torrserver/config
      - ${APP_DATA_DIR}/data/torrents:/opt/torrserver/torrents

