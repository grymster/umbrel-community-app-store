version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: grymster-torrserver_app_1
      APP_PORT: 8090
      PROXY_AUTH_ADD: "false"
  app:
    image: ghcr.io/yourok/torrserver:MatriX.141@sha256:afed5d6ff406e6a32bad627a225d8c36d344d48f23df9c29c9b6d5324cd491e6
    user: "1000:1000"
    environment:
      TS_PORT: "8090"
      TS_DONTKILL: "1"
      TS_HTTPAUTH: "0"
      TS_CONF_PATH: /opt/torrserver/config
      TS_TORR_DIR: /opt/torrserver/torrents
    volumes:
      - ${APP_DATA_DIR}/data/config:/opt/torrserver/config
      - ${APP_DATA_DIR}/data/torrents:/opt/torrserver/torrents

